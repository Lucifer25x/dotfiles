[colors]
background = #1e1e2e
background-alt = #5C6F7B
foreground = #DCE0E8
primary = #7287FD
secondary = #7287FD
alert = #D20F39
disabled = #3E4452
border = #11111B

[bar/example]
width = 100%
height = 20pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 0
border-color = ${colors.border}

padding-left = 0
padding-right = 1
module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:style=Regular:size=11;2

modules-left = xworkspaces xwindow
modules-center = date
modules-right = clipboard memory cpu battery pulseaudio xkeyboard systray powermenu

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/powermenu]
type = custom/text
expand-right = true
format = ⏻
click-left = exec rofi -show powermenu -modi powermenu:~/.config/rofi/scripts/rofi-power-menu

[module/clipboard]
type = custom/text
format = 
click-left = exec rofi -modi "clipboard:greenclip print" -show clipboard -run-command '{cmd}'
click-right = exec ~/.config/rofi/scripts/clear_clipboard

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT1
adapter = ACAD
poll-interval = 5
format-charging-prefix = "󰂄 "
format-charging-prefix-foreground = ${colors.primary}
format-discharging-prefix = "󰁹 "
format-discharging-prefix-foreground = ${colors.primary}
format-full-prefix = "󰁹 "
format-full-prefix-foreground = ${colors.primary}
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = FULL

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = "󰖁 muted"
label-muted-foreground = ${colors.disabled}
click-right = exec pavucontrol

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
label-layout = 󰌌 %layout%
label-layout-foreground = ${colors.primary}
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 5
time = %H:%M
date = %A, %B %d
date-alt = %A, %B %d, %Y
time-alt = %H:%M:%S
format-padding = 2
label = 󰃭 %date%, %time%

[settings]
screenchange-reload = true
pseudo-transparency = true
